<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>穂乃花用暗記ページ</title>

<style>
:root{
  --bg:#f5f7fa;
  --card:#ffffff;
  --text:#222;
  --primary:#4f46e5;
  --blue:#2563eb;
  --red:#dc2626;
  --bar-bg:#e5e7eb;
}

@media (prefers-color-scheme: dark){
  :root{
    --bg:#111827;
    --card:#1f2937;
    --text:#f3f4f6;
    --bar-bg:#374151;
  }
}

/* ===== 全体 ===== */
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:var(--bg);
  color:var(--text);
  margin:0;
  padding:20px;
  font-size:18px; /* ← 少し大きく */
}

/* ===== カード ===== */
.card{
  background:var(--card);
  padding:20px;
  margin-bottom:20px;
  border-radius:16px;
  box-shadow:0 8px 18px rgba(0,0,0,0.08);
}

/* ===== 選択UI ===== */
.select-group{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.select-card{
  padding:10px 16px;
  border-radius:12px;
  cursor:pointer;
  background:rgba(0,0,0,.05);
  border:2px solid transparent;
  font-size:16px;
}

.select-card.active{
  border:2px solid var(--primary);
  background:rgba(79,70,229,.1);
}

/* ===== 問題文 ===== */
.card p:nth-of-type(2){
  font-size:26px;
  font-weight:bold;
}

/* ===== 入力欄 ===== */
input[type="text"],input[type="number"]{
  padding:12px;
  border-radius:8px;
  border:1px solid #ccc;
  width:100%;
  box-sizing:border-box;
  font-size:18px;
}

/* ===== ボタン ===== */
button{
  padding:12px 18px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  background:linear-gradient(90deg,#6366f1,#4f46e5);
  color:white;
  font-size:17px;
}

/* サブボタン（終了） */
.secondary-btn{
  background:transparent;
  border:2px solid var(--primary);
  color:var(--primary);
}

/* ボタンの位置調整 */
.card button{
  margin-top:10px;
}

/* 次へ → 終了 の間隔 */
.card button + button{
  margin-left:30px;
}

/* ===== 正誤表示 ===== */
.correct{
  color:var(--blue);
  font-weight:bold;
}

.wrong{
  color:var(--red);
  font-weight:bold;
}

/* ===== バー ===== */
.bar-container{
  width:100%;
  height:22px;
  background:var(--bar-bg);
  border-radius:12px;
  overflow:hidden;
  margin:10px 0 20px 0;
}

.bar{
  height:100%;
  background:linear-gradient(90deg,#22c55e,#16a34a);
  transition:width .6s ease;
}

/* ===== 見出し ===== */
h2{
  font-size:26px;
}

h3{
  font-size:20px;
}
</style>
</head>

});

loadMemory();

function playCorrect(){
  const ctx = new (window.AudioContext || window.webkitAudioContext)();

  const notes = [1100, 880]; // 高→少し低（ピンポン感）
  
  notes.forEach((freq, i)=>{
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "sine";
    osc.frequency.value = freq;

    gain.gain.setValueAtTime(0.25, ctx.currentTime + i*0.12);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.12 + 0.2);

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start(ctx.currentTime + i*0.12);
    osc.stop(ctx.currentTime + i*0.12 + 0.2);
  });
}

function playWrong(){
  const ctx = new (window.AudioContext || window.webkitAudioContext)();

  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = "square"; // ← ブザー感
  osc.frequency.setValueAtTime(200, ctx.currentTime);
  osc.frequency.linearRampToValueAtTime(120, ctx.currentTime + 0.3);

  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start();
  osc.stop(ctx.currentTime + 0.3);
}

function normalizeNum(str){
  return str.replace(/[０-９]/g, s =>
    String.fromCharCode(s.charCodeAt(0)-0xFEE0)
  );
}

function normalizeAll(str){
  return normalizeNum(str)
    .replace(/、/g,",")
    .replace(/\s+/g,"")
    .trim();
}

const selectedStatus=document.querySelector("[data-status].active").dataset.status;

if(selectedStatus!=="all"){
  quiz.questions=quiz.questions.filter(q=>{
    return normalizeNum(q.status) === normalizeNum(selectedStatus);
  });
}

function setupSelect(selector){
  document.querySelectorAll(selector).forEach(el=>{
    el.onclick=()=>{
      document.querySelectorAll(selector).forEach(e=>e.classList.remove("active"));
      el.classList.add("active");
    };
  });
}

function generatePrimeQuiz(){
  const questions = [];
  const used = new Set();

  while(questions.length < 10){
    let num = Math.floor(Math.random() * 100) + 1;

    // 10以上の偶数はスキップ
    if(num >= 10 && num % 2 === 0) continue;

    if(used.has(num)) continue;
    used.add(num);

    questions.push({
      question: `${num}は素数？`,
      answer: isPrime(num) ? "○" : "×",
      status: "prime"
    });
  }

  return questions;
}

function submitOX(choice){
  const q = quiz.questions[index];
  const isCorrect = choice === q.answer;

  if(isCorrect){
    score++;
    playCorrect();
  }else{
    playWrong();
  }

  results.push({
    question:q.question,
    user:choice,
    correct:q.answer,
    isCorrect
  });

  if(judgeMode==="instant"){
    showInstant(isCorrect,q.answer);
  }else{
    index++;
    showQuestion();
  }
}

function isPrime(n){
  if(n < 2) return false;
  for(let i=2;i*i<=n;i++){
    if(n % i === 0) return false;
  }
  return true;
}

/* クイズ開始 */
function startQuiz(){
  startTime = Date.now();
  questionTimes = [];

  judgeMode = document.querySelector("[data-judge].active").dataset.judge;
  mode = document.querySelector("[data-mode].active").dataset.mode;
  const selectedStatus = document.querySelector("[data-status].active").dataset.status;

  const questionLimit = parseInt(document.getElementById("questionCount").value);

  // ===== 通常問題コピー =====
  quiz = { questions: [...originalQuiz.questions] };

  // ===== 素数だけ特別処理 =====
  if(selectedStatus === "prime"){
    const primeQuestions = [];

    for(let i = 0; i < 10; i++){
      const num = Math.floor(Math.random() * 100) + 1;
      if(num >= 10 && num % 2 === 0) continue;

      primeQuestions.push({
        question: `${num}は素数？`,
        answer: isPrime(num) ? "y" : "n",
        status: "prime"
      });
    }

    quiz.questions = primeQuestions;

  } else {

    // ===== 通常フィルタ =====
    if(selectedStatus !== "all"){
      quiz.questions = quiz.questions.filter(q=>{
        return String(q.status) === String(selectedStatus);
      });
    }

    // ===== 並び替え =====
    if(mode === "random") shuffle(quiz.questions);

    if(mode === "weak"){
      quiz.questions.sort((a,b)=>{
        return (b.stats.wrong - b.stats.correct) -
               (a.stats.wrong - a.stats.correct);
      });
    }

    // ===== 問題数制限 =====
    if(!isNaN(questionLimit) && questionLimit > 0){
      quiz.questions = quiz.questions.slice(0, questionLimit);
    }
  }

  // ===== 0問対策 =====
  if(quiz.questions.length === 0){
    alert("この条件の問題はありません");
    showStart();
    return;
  }

  showQuestion();
}

function focusInput(){
  setTimeout(()=>{
    const input=document.getElementById("userAnswer");
    if(input) input.focus();
  },50);
}

function showQuestion(){
  if(mode==="memory"){showMemoryQuestion();return;}
  if(index>=quiz.questions.length){showResult();return;}

  const q = quiz.questions[index];

  // ===== 素数問題だけ特別UI =====
  if(q.status === "prime"){
  app.innerHTML = `
  <div class="card">
    <p>第 ${index+1} 問 / ${quiz.questions.length}</p>
    <p>${q.question}</p>

    <button class="enter-active" onclick="answerPrime('○')">○（素数）</button>
    <button class="secondary-btn" onclick="answerPrime('×')">×（素数じゃない）</button>
  </div>
  `;
  　return;
　}

  // ===== 通常問題 =====
  app.innerHTML = `
  <div class="card">
    <p>第 ${index+1} 問 / ${quiz.questions.length}</p>
    <p>${q.question}</p>
    <input type="text" id="userAnswer">
    <br><br>
    <button id="answerBtn" class="enter-active">解答</button>
  </div>
  `;
  focusInput();
}
/* 通常チェック */
document.addEventListener("click",e=>{
  if(e.target && e.target.id==="answerBtn"){
    if(mode==="memory") checkMemoryAnswer();
    else checkAnswer();
  }
});

function checkAnswer(){
  const now = Date.now();
  const diff = (now - lastQuestionTime) / 1000;
  questionTimes.push(diff);
  lastQuestionTime = now;

  const user = document.getElementById("userAnswer").value.trim();
  const q = quiz.questions[index];
  const correct = q.answer.trim();
  const isCorrect = normalizeAll(user) === normalizeAll(correct);

  if(isCorrect){
    score++;
    q.stats.correct++;
    playCorrect();
  }else{
    q.stats.wrong++;
    playWrong();
  }

  saveStats();
  saveStatus();

  results.push({
    question:q.question,
    user:user||"(未解答)",
    correct,
    isCorrect
  });

  // ★ これが超重要
  if(judgeMode==="instant"){
    showInstant(isCorrect, correct);
  }else{
    index++;
    showQuestion();
  }
}
  
function answerPrime(choice){
  const now = Date.now();
  const diff = (now - lastQuestionTime) / 1000;
  questionTimes.push(diff);
  lastQuestionTime = now;
  const q = quiz.questions[index];

  const userYN = (choice === "○") ? "y" : "n";
  const isCorrect = userYN === q.answer;

  if(isCorrect){
    score++;
    playCorrect();   // ←追加
  }else{
    playWrong();     // ←追加
  }

  results.push({
    question:q.question,
    user:choice,
    correct:q.answer === "y" ? "○" : "×",
    isCorrect
  });

  if(judgeMode==="instant"){
    showInstant(isCorrect, q.answer === "y" ? "○" : "×");
  }else{
    index++;
    showQuestion();
  }
}

function showInstant(isCorrect,correct){
  app.innerHTML=`
  <div class="card">
    <h3 class="${isCorrect?'correct':'wrong'}">
      ${isCorrect?'正解！':'不正解'}
    </h3>
    ${!isCorrect?`<p>正解：${correct}</p>`:''}
    <button class="enter-active" onclick="nextQuestion()">次へ</button>
    <button class="secondary-btn"
   style="margin-left:40px;"  onclick="showResult()">終了</button>
  </div>
  `;
}

function nextQuestion(){index++;showQuestion();}

function showResult(){
  const total=quiz?.questions?.length||score;
  const rate=total===0?0:Math.round((score/total)*100);

  const endTime = Date.now();
  const totalSec = ((endTime - startTime) / 1000).toFixed(2);

  let avgSec = 0;
  if(questionTimes.length > 0){
    avgSec = (totalSec / questionTimes.length).toFixed(2);
  }

  let detailHTML = "";
  results.forEach((r,i)=>{
    detailHTML += `
      <div style="margin-bottom:12px;padding:10px;border-radius:10px;background:rgba(0,0,0,0.03);">
        <b>第${i+1}問：</b>${r.question}<br>
        あなた：${r.user}<br>
        正解：${r.correct}<br>
        <span class="${r.isCorrect?'correct':'wrong'}">
          ${r.isCorrect?'正解':'不正解'}
        </span>
      </div>
    `;
  });

  app.innerHTML=`
  <div class="card">
    <h2>リザルト</h2>
    <h3>正解数：${score}/${total}</h3>

    <p>⏱ 全体の時間：${totalSec} 秒</p>
    <p>⏱ 1問あたり平均：${avgSec} 秒</p>

    <div class="bar-container">
      <div class="bar" style="width:${rate}%"></div>
    </div>
    
    <button onclick="showStart()">もう一度</button>

    <h3>解答一覧</h3>
    ${detailHTML}
  </div>
  `;
}

function showMemoryQuestion(){
  const available=quiz.questions.filter(q=>!q.memory.done);
  if(available.length===0){memoryCounter=0;showMemoryProgress();return;}
  if(memoryCounter>=MEMORY_INTERVAL){memoryCounter=0;showMemoryProgress();return;}

  currentMemoryQuestion=q;
  memoryCounter++;

  app.innerHTML=`
  <div class="card">
    <p>${q.question}</p>
    <input type="text" id="userAnswer">
    <br><br>
    <button id="answerBtn" class="enter-active">解答</button>
    <button class="secondary-btn" onclick="showResult()">終了</button>
  </div>
  `;
  focusInput();
}

function checkMemoryAnswer(){
  const now = Date.now();
  questionTimes.push(now);

  const user=document.getElementById("userAnswer").value.trim();
  const q=currentMemoryQuestion;
  const correct=q.answer.trim();
  const isCorrect = normalizeAll(user) === normalizeAll(correct);

  if(isCorrect){q.memory.done=true;score++;}

  saveMemory();
  saveStatus();

  app.innerHTML=`
  <div class="card">
    <h3 class="${isCorrect?'correct':'wrong'}">
      ${isCorrect?'正解！':'不正解'}
    </h3>
    ${!isCorrect?`<p>正解：${correct}</p>`:''}
    <button class="enter-active" onclick="showMemoryQuestion()">次へ</button>
    <button class="secondary-btn" onclick="showResult()">終了</button>
  </div>
  `;
}

function showMemoryProgress(){
  const mastered=quiz.questions.filter(q=>q.memory.done).length;
  const percent=Math.round((mastered/quiz.questions.length)*100);

  app.innerHTML=`
  <div class="card">
    <h2>途中リザルト</h2>
    <p>現在の得点：${score}</p>
    <p>完全習得：${mastered}/${quiz.questions.length}</p>
    <div class="bar-container">
      <div class="bar" style="width:${percent}%"></div>
    </div>
    <button class="enter-active" onclick="showMemoryQuestion()">続ける</button>
    <button class="secondary-btn" onclick="showResult()">終了</button>
  </div>
  `;
}

/* 保存系 */
function saveMemory(){
  localStorage.setItem("quizMemory",
    JSON.stringify(originalQuiz.questions.map(q=>q.memory))
  );
}
function loadMemory(){
  const saved=localStorage.getItem("quizMemory");
  if(!saved) return;
  const memories=JSON.parse(saved);
  originalQuiz.questions.forEach((q,i)=>{
    if(memories[i]) q.memory=memories[i];
  });
}

function saveStats(){
  localStorage.setItem("quizStats",
    JSON.stringify(originalQuiz.questions.map(q=>q.stats))
  );
}
function loadStats(){
  const saved=localStorage.getItem("quizStats");
  if(!saved) return;
  const stats=JSON.parse(saved);
  originalQuiz.questions.forEach((q,i)=>{
    if(stats[i]) q.stats=stats[i];
  });
}

function saveStatus(){
  localStorage.setItem("quizStatus",
    JSON.stringify(originalQuiz.questions.map(q=>q.status))
  );
}
function loadStatus(){
  const saved=localStorage.getItem("quizStatus");
  if(!saved) return;
  const statuses=JSON.parse(saved);
  originalQuiz.questions.forEach((q,i)=>{
    if(statuses[i]) q.status=statuses[i];
  });
}

/* シャッフル */
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}
